[dionaea]
download.dir=/opt/dionaea/var/dionaea/binaries/
modules=curl,python,pcap
processors=filter_streamdumper

listen.mode=getifaddrs
# listen.addresses=0.0.0.0
# listen.interfaces=eth0

ssl.default.c=US
ssl.default.cn=
ssl.default.o=
ssl.default.ou=

[logging]
default.levels=all,-debug
default.domains=*
default.filename=/opt/dionaea/var/log/dionaea/dionaea.log

errors.levels=warning,error
errors.domains=*
errors.filename=/opt/dionaea/var/log/dionaea/dionaea-errors.log

[processor.filter_streamdumper]
config.allowed.types=accept,connect
config.actions.0.type=streamdumper
config.actions.0.config.path=/opt/dionaea/var/dionaea/bistreams/%Y-%m-%d/

[processor.filter_emu]
config.allowed.types=accept,connect
config.actions.0.type=emu

[module.python]
# JSON log output is consumed by NeuroTrap's LogIngestionPipeline.
sys_paths=default
imports=dionaea.log,dionaea.services,dionaea.ihandlers

[module.python.logging]
default.filename=/opt/dionaea/var/log/dionaea/dionaea.json
default.levels=all,-debug
default.domains=*

[module.python.ihandlers]
handlers=ftpdownload,tftpdownload,store,uniquedownload,logjson

[module.python.ihandlers.logjson]
# Emit one JSON document per connection/event for the ingestion pipeline.
file=/opt/dionaea/var/log/dionaea/dionaea.json
flat_data=true

[module.python.services]
# Emulated vulnerable services the collector exposes.
serve=http,https,ftp,tftp,smb,mysql,mssql,sip

[module.nfq]
queue=2
