{
  "device.node_id": "neurotrap-opencanary",
  "ip.ignorelist": [],
  "logtype.ignorelist": [],
  "git.enabled": false,

  "ssh.enabled": true,
  "ssh.port": 22,
  "ssh.version": "SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5",

  "telnet.enabled": true,
  "telnet.port": 23,
  "telnet.banner": "Ubuntu 22.04 LTS",

  "ftp.enabled": true,
  "ftp.port": 21,
  "ftp.banner": "FTP server ready",

  "http.enabled": true,
  "http.port": 80,
  "http.banner": "Apache/2.4.52 (Ubuntu)",
  "http.skin": "nasLogin",

  "smb.enabled": true,
  "smb.port": 445,

  "mysql.enabled": true,
  "mysql.port": 3306,
  "mysql.banner": "5.7.40-0ubuntu0.22.04.1",

  "mssql.enabled": true,
  "mssql.port": 1433,
  "mssql.version": "2019",

  "snmp.enabled": true,
  "snmp.port": 161,

  "vnc.enabled": true,
  "vnc.port": 5900,

  "rdp.enabled": true,
  "rdp.port": 3389,

  "logger": {
    "class": "PyLogger",
    "kwargs": {
      "formatters": {
        "plain": { "format": "%(message)s" }
      },
      "handlers": {
        "file": {
          "class": "logging.FileHandler",
          "filename": "/var/tmp/opencanary/opencanary.log"
        }
      }
    }
  }
