[honeypot]
hostname = prod-server-01
log_path = var/log/cowrie
download_path = var/lib/cowrie/downloads
contents_path = honeyfs
state_path = var/lib/cowrie
etc_path = etc

[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json

[output_textlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.log

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
version_string = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6
rsa_public_key = etc/ssh_host_rsa_key.pub
rsa_private_key = etc/ssh_host_rsa_key
dsap_public_key = etc/ssh_host_dsa_key.pub
dsap_private_key = etc/ssh_host_dsa_key
# Enable malware download capturing
download_limit_size = 10485760

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[shell]
# Fake filesystem — mapped from honeyfs/
filesystem = ${honeypot:state_path}/fs.pickle
