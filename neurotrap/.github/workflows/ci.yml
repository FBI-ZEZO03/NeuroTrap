name: NeuroTrap CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/behavior.txt
          pip install -r requirements/api.txt
          pip install pytest pytest-cov faker

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Lint check
        run: |
          pip install ruff
          ruff check src/ tests/ --ignore E501

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f docker/Dockerfile.api -t neurotrap-api:test .
          docker build -f docker/Dockerfile.behavior -t neurotrap-behavior:test .
